name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          version="${GITHUB_REF_NAME#v}"
          ldflags="-s -w \
            -X github.com/jesperfj/cub-lk/cmd.version=${version} \
            -X github.com/jesperfj/cub-lk/cmd.commit=${GITHUB_SHA} \
            -X github.com/jesperfj/cub-lk/cmd.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          out="cub-lk-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags "$ldflags" -o "$out" .
          echo "ASSET=$out" >> "$GITHUB_ENV"
      - name: Checksum
        run: shasum -a 256 "$ASSET" > "$ASSET.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
